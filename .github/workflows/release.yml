name: Release

# Trigger when a semver tag is pushed (e.g. v0.1.3 or 0.1.3) or via UI.
on:
  push:
    tags:
      - "v*.*.*"
      - "[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.3). Must already be pushed."
        required: true

permissions:
  contents: write   # required to create releases and upload assets

jobs:
  build-and-release:
    name: Build kvm_app and publish release
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            RAW="${{ github.event.inputs.tag }}"
          else
            RAW="${GITHUB_REF#refs/tags/}"
          fi
          # Strip leading 'v' for the semver value baked into the binary.
          SEMVER="${RAW#v}"
          echo "tag=${RAW}"     >> "$GITHUB_OUTPUT"
          echo "semver=${SEMVER}" >> "$GITHUB_OUTPUT"
          echo "Tag:    ${RAW}"
          echo "Semver: ${SEMVER}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend deps
        working-directory: ui
        run: npm ci

      - name: Build frontend (device mode)
        working-directory: ui
        run: npm run build:device

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.4"
          cache: true

      - name: Cross-compile kvm_app (ARMv7 Linux)
        env:
          GOOS: linux
          GOARCH: arm
          GOARM: "7"
          CGO_ENABLED: "0"
        run: |
          mkdir -p bin
          go build -tags netgo -trimpath \
            -ldflags "-s -w -X kvm.builtAppVersion=${{ steps.ver.outputs.semver }}" \
            -o bin/kvm_app cmd/main.go
          ls -lh bin/kvm_app
          sha256sum bin/kvm_app | tee bin/kvm_app.sha256

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            bin/kvm_app
            bin/kvm_app.sha256
